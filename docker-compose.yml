services:
  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      UVICORN_RELOAD: "false"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
