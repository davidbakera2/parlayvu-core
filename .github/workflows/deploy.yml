name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: parlayvucore.azurecr.io
  RESOURCE_GROUP: rg-parlayvu-demo

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/parlayvu-api:${{ github.sha }}
            ${{ env.REGISTRY }}/parlayvu-api:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name parlayvu-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/parlayvu-api:${{ github.sha }}

  build-teams-media-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Teams Media Bot image
        uses: docker/build-push-action@v5
        with:
          context: services/teams-media-bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/parlayvu-teams-media-bot:${{ github.sha }}
            ${{ env.REGISTRY }}/parlayvu-teams-media-bot:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Teams Media Bot to Container App
        run: |
          az containerapp update \
            --name parlayvu-teams-media-bot \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/parlayvu-teams-media-bot:${{ github.sha }} \
          2>/dev/null || echo "Container App not yet created — run infra setup first"

  build-teams-media-worker:
    # Windows Server 2022 runner — required because the Graph Communications
    # Media SDK ships Windows-native DLLs that cannot be restored or built on Linux.
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        working-directory: services/teams-media-bot-media-worker
        run: dotnet restore src/ParlayVu.TeamsMediaWorker/ParlayVu.TeamsMediaWorker.csproj

      - name: Build media worker
        working-directory: services/teams-media-bot-media-worker
        run: |
          dotnet publish src/ParlayVu.TeamsMediaWorker/ParlayVu.TeamsMediaWorker.csproj `
            -c Release -r win-x64 --no-restore -o publish

      # Note: Docker Windows containers cannot be built on GitHub-hosted runners
      # because they require Docker Desktop in Windows container mode (not available
      # in GitHub Actions). The publish artifact is uploaded below.
      # To deploy to the Windows VM, download the artifact and xcopy to the VM.
      - name: Upload media worker publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: parlayvu-teams-media-worker-${{ github.sha }}
          path: services/teams-media-bot-media-worker/publish/
          retention-days: 14
