name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: parlayvucore.azurecr.io
  RESOURCE_GROUP: rg-parlayvu-demo

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/parlayvu-api:${{ github.sha }}
            ${{ env.REGISTRY }}/parlayvu-api:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name parlayvu-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/parlayvu-api:${{ github.sha }}

  build-teams-media-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Teams Media Bot image
        uses: docker/build-push-action@v5
        with:
          context: services/teams-media-bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/parlayvu-teams-media-bot:${{ github.sha }}
            ${{ env.REGISTRY }}/parlayvu-teams-media-bot:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Teams Media Bot to Container App
        run: |
          az containerapp update \
            --name parlayvu-teams-media-bot \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/parlayvu-teams-media-bot:${{ github.sha }} \
          2>/dev/null || echo "Container App not yet created — run infra setup first"
