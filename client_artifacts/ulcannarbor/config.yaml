  channel_id: "19:UeZIUG3kZWw2u6Tm0XfUFu7T2NrpHUy_OX5MWxhoe-w1@thread.tacv2"
cloudflare:
  preview_project: "ulcannarbor-previews"
  production_project: "ulcannarbor"
  production_domain: "ulcannarbor.info"
preferences:
  pronunciation: {}
  tone: null
  # Email addresses (or Bot Framework user identifiers) allowed to DM
  # Nathan-for-this-client directly. Channel posts in the bound Teams
  # channel skip this check. Empty list = no DM access allowed (fail-closed).
