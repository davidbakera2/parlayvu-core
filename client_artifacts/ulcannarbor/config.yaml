# meeting_notes_folder and template_path are inherited from the standard
# defaults in app/client_config.py — only override here if ULC needs a
# custom path (none currently do).
#
# cloudflare.preview_project and cloudflare.production_project also have
# convention defaults (<client_id>-previews and <client_id>). Listing them
# here makes the binding explicit and acts as documentation for what's
# expected to exist in the Cloudflare account.

