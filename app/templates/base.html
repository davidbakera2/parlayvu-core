<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ParlayVU{% endblock %}</title>
  <style>
    :root { --bg:#0b0c10; --card:#15171e; --fg:#e8eaed; --muted:#9aa0a6; --accent:#6c5ce7; --accent2:#00d1b2; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: radial-gradient(1200px 600px at 50% -10%, #1b1e2b, var(--bg)); color: var(--fg);
           min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { background: var(--card); border:1px solid #23262f; border-radius:16px; padding:40px;
            width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,.45); }
    .plan-card { padding:22px 0; border-top:1px solid #23262f; }
    .plan-card h2 { font-size:19px; margin:0 0 4px; }
    .plan-card ul { list-style:none; padding:0; margin:12px 0 0; font-size:13px; line-height:1.5; }
    .plan-card ul li { padding-left:18px; position:relative; margin:6px 0; }
    .plan-card ul li::before { content:"✓"; position:absolute; left:0; color:var(--accent2); }
    .brand { font-weight:700; letter-spacing:.5px; font-size:14px; color:var(--accent2); text-transform:uppercase; }
    h1 { font-size:24px; margin:8px 0 4px; }
    p.muted { color: var(--muted); margin-top:0; line-height:1.5; }
    label { display:block; font-size:13px; color:var(--muted); margin:18px 0 6px; }
    input[type=email] { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #2a2e3a;
            background:#0f1117; color:var(--fg); font-size:15px; }
    button, .btn { display:inline-block; width:100%; padding:13px 16px; border:0; border-radius:10px;
            background: var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer;
            margin-top:18px; text-align:center; text-decoration:none; }
    button.secondary, .btn.secondary { background:transparent; border:1px solid #2a2e3a; color:var(--fg); }
    .price { font-size:34px; font-weight:700; margin:6px 0; }
    .price small { font-size:15px; color:var(--muted); font-weight:400; }
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:600; }
    .pill.ok { background:rgba(0,209,178,.15); color:var(--accent2); }
    .pill.warn { background:rgba(255,159,67,.15); color:#ff9f43; }
    .error { background:rgba(255,99,99,.12); color:#ff8a8a; padding:10px 12px; border-radius:10px; font-size:13px; }
    .row { display:flex; gap:12px; }
    .row > * { flex:1; }
    a.link { color:var(--accent2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">ParlayVU.ai</div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
